<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Tiến Vỹ</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <button id="menuToggle" class="menu-toggle">☰ Menu</button>
    <nav id="mainMenu" class="main-menu">
        <a href="#home">Trang chủ</a>
        <a href="#about">Giới thiệu</a>
        <a href="#hobbies">Sở thích</a>
        <a href="#contact">Liên hệ</a>
    </nav>

    <select id="themeSelect">
        <option value="">Giao diện mặc định</option>
        <option value="dark-mode">Nền tối</option>
        <option value="warm-mode">Nền ấm</option>
    </select>

    <div class="container">
        <div class="avatar">
            <img src="https://ddragon.leagueoflegends.com/cdn/img/champion/tiles/Mordekaiser_55.jpg" alt="Mo đàm">
        </div>
        <button id="toggleAboutBtn">Xem thêm / Ẩn giới thiệu</button>
        <div id="aboutContent">
            <h1 id="mainTitle">Nguyễn Tiến Vỹ</h1>
            <p class="bio" id="welcomeText">Tôi học trường cao đẳng và đang học lập trình web</p>
            <div class="hobbies">
                <h2>Sở thích</h2>
                <input type="text" id="searchInput" placeholder="Tìm sở thích...">
                <ul>
                    <li class="search-item">🎮 Chơi game</li>
                    <li class="search-item">🎵 Nghe nhạc</li>
                    <li class="search-item">📷 Chụp ảnh</li>
                    <li class="search-item">⚽ Đá bóng</li>
                    <li class="search-item">📚 Đọc sách</li>
                </ul>
            </div>

            <div class="gallery-section">
                <h2>Thư viện ảnh</h2>
                <div class="filter-buttons">
                    <button class="filter-btn" data-filter="all">Tất cả</button>
                    <button class="filter-btn" data-filter="game">Game</button>
                    <button class="filter-btn" data-filter="nhac">Âm nhạc</button>
                    <button class="filter-btn" data-filter="thethao">Thể thao</button>
                </div>
                <div class="gallery">
                    <article class="gallery-item" data-category="game">
                        <img src="https://picsum.photos/seed/game1/150/100" alt="Game">
                        <p>Khoảnh khắc chơi game</p>
                    </article>
                    <article class="gallery-item" data-category="nhac">
                        <img src="https://picsum.photos/seed/music1/150/100" alt="Âm nhạc">
                        <p>Nghe nhạc thư giãn</p>
                    </article>
                    <article class="gallery-item" data-category="thethao">
                        <img src="https://picsum.photos/seed/sport1/150/100" alt="Thể thao">
                        <p>Đá bóng cùng bạn bè</p>
                    </article>
                    <article class="gallery-item" data-category="game">
                        <img src="https://picsum.photos/seed/game2/150/100" alt="Game">
                        <p>Giải đấu online</p>
                    </article>
                </div>
            </div>

            <div class="contact-section">
                <h2>Liên hệ</h2>
                <form id="contactForm">
                    <input type="text" id="fullName" placeholder="Họ tên của bạn">
                    <input type="text" id="email" placeholder="Email của bạn">
                    <button type="submit">Gửi</button>
                    <p id="formMessage"></p>
                </form>
            </div>
        </div>
    </div>
    <script src="../js/script.js"></script>
</body>
</html>
